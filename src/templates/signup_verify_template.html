<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify Your Account</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, sans-serif;">

    <table align="center" width="100%" cellpadding="0" cellspacing="0" style="padding:20px;">
        <tr>
            <td align="center">
                
                <!-- Main Container -->
                <table width="420" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:10px; padding:20px;">
                    
                    <!-- Header -->
                    <tr>
                        <td align="center">
                            <h2 style="margin:0; color:#333;">Verify Your Account</h2>
                            <p style="color:#777; font-size:14px;">Thanks for signing up!</p>
                        </td>
                    </tr>

                    <!-- Banner -->
                    <tr>
                        <td align="center" style="padding:15px 0;">
                            <img src="cid:banner_image" width="100%" style="border-radius:8px;" />
                        </td>
                    </tr>

                    <!-- Message -->
                    <tr>
                        <td align="center">
                            <p style="color:#555; font-size:15px;">
                                Hi <b>{{ username }}</b>,<br><br>
                                Use the verification code below to complete your signup:
                            </p>
                        </td>
                    </tr>

                    <!-- OTP Box -->
                    <tr>
                        <td align="center" style="padding:20px 0;">
                            <div style="
                                font-size:32px;
                                font-weight:bold;
                                letter-spacing:5px;
                                color:#007BFF;
                                background:#f1f7ff;
                                padding:15px 25px;
                                border-radius:8px;
                                display:inline-block;
                            ">
                                {{ otp }}
                            </div>
                        </td>
                    </tr>

                    <!-- Expiry -->
                    <tr>
                        <td align="center">
                            <p style="color:#999; font-size:13px;">
                                This code will expire in {{ expiry }} minutes.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center" style="padding-top:20px;">
                            <p style="color:#aaa; font-size:12px;">
                                If you didn’t create an account, you can ignore this email.
                            </p>
                        </td>
                    </tr>

                </table>

                <!-- Bottom -->
                <p style="font-size:12px; color:#aaa; margin-top:15px;">
                    © 2026 Medy-GPT. All rights reserved.
                </p>

            </td>
        </tr>
    </table>

</body>
</html>
